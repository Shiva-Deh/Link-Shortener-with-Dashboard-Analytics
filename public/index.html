<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Link Shortener</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --line: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 48px 16px;
    }
    .wrap { max-width: 820px; margin: 0 auto; }
    header { margin-bottom: 24px; }
    h1 { font-size: 1.5rem; margin: 0; }
    header p { color: var(--muted); margin: 4px 0 0; font-size: 0.9rem; }

    form { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    input {
      padding: 10px 12px; font-size: 0.95rem;
      border: 1px solid var(--line); border-radius: 6px; background: var(--card);
    }
    #url { flex: 1; min-width: 220px; }
    #custom { width: 150px; }
    input:focus { outline: none; border-color: var(--accent); }
    button.primary {
      padding: 10px 18px; border: 0; border-radius: 6px;
      background: var(--accent); color: #fff; font-weight: 500; cursor: pointer;
    }
    button.primary:hover { background: #1d4ed8; }
    .err { color: #b91c1c; font-size: 0.85rem; min-height: 1.1em; margin-bottom: 16px; }

    .result { display: none; align-items: center; gap: 16px; background: var(--card);
              border: 1px solid var(--line); border-radius: 8px; padding: 16px; margin-bottom: 24px; }
    .result img { width: 96px; height: 96px; border: 1px solid var(--line); border-radius: 6px; background: #fff; }
    .result .link { font-family: ui-monospace, monospace; color: var(--accent); word-break: break-all; }
    .result .rcopy { margin-top: 10px; margin-left: 0; }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 14px 16px; }
    .stat .n { font-size: 1.5rem; font-weight: 600; }
    .stat .l { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }

    .panel { background: var(--card); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em;
         color: var(--muted); padding: 12px 16px; border-bottom: 1px solid var(--line); }
    td { padding: 12px 16px; border-bottom: 1px solid var(--line); font-size: 0.9rem; vertical-align: top; }
    tr:last-child td { border-bottom: 0; }
    .row-main { cursor: pointer; }
    .row-main:hover { background: #fafafa; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .code { font-family: ui-monospace, monospace; color: var(--accent); }
    .orig { color: var(--muted); max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .copy, .del { margin-left: 8px; border: 1px solid var(--line); background: #fff; border-radius: 4px;
            font-size: 0.75rem; padding: 1px 6px; cursor: pointer; color: var(--muted); }
    .copy:hover { color: var(--text); }
    .del:hover { color: #b91c1c; border-color: #f0c8c8; }
    .time { color: var(--muted); font-size: 0.85rem; }

    .detail td { background: #fafafa; }
    .detail h4 { margin: 0 0 8px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
    .detail-top { display: flex; gap: 32px; margin-bottom: 20px; }
    .qr img { width: 96px; height: 96px; border: 1px solid var(--line); border-radius: 6px; background: #fff; }
    .bars { display: flex; align-items: flex-end; gap: 6px; height: 56px; }
    .bar { width: 20px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bar .fill { width: 100%; background: var(--accent); border-radius: 3px 3px 0 0; min-height: 2px; }
    .bar .day { font-size: 0.7rem; color: var(--muted); }
    .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .cols ul { list-style: none; margin: 0; padding: 0; }
    .cols li { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 3px 0; }
    .cols li span:last-child { color: var(--muted); font-variant-numeric: tabular-nums; }
    .empty { padding: 24px 16px; color: var(--muted); font-size: 0.9rem; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Link Shortener</h1>
      <p>Shorten links and track clicks by source.</p>
    </header>

    <form id="form">
      <input id="url" type="text" placeholder="https://example.com/long/link" autocomplete="off">
      <input id="custom" type="text" placeholder="custom code (optional)" autocomplete="off">
      <button type="submit" class="primary">Shorten</button>
    </form>
    <div class="err" id="err"></div>
    <div class="result" id="result"></div>

    <div class="stats">
      <div class="stat"><div class="n" id="t-links">0</div><div class="l">Links</div></div>
      <div class="stat"><div class="n" id="t-clicks">0</div><div class="l">Total clicks</div></div>
      <div class="stat"><div class="n" id="t-avg">0</div><div class="l">Avg / link</div></div>
    </div>

    <div class="panel">
      <table>
        <thead>
          <tr>
            <th>Short link</th>
            <th>Created</th>
            <th class="num">Clicks</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const err = document.getElementById('err');
    const rows = document.getElementById('rows');
    const result = document.getElementById('result');
    let openCode = null;

    function ago(ts) {
      if (!ts) return '—';
      const s = Math.floor((Date.now() - ts) / 1000);
      if (s < 60) return 'just now';
      if (s < 3600) return Math.floor(s / 60) + 'm ago';
      if (s < 86400) return Math.floor(s / 3600) + 'h ago';
      return Math.floor(s / 86400) + 'd ago';
    }

    function host(url) {
      if (!url || url === 'Direct') return 'Direct';
      try { return new URL(url).hostname; } catch { return url; }
    }

    function dayLabel(ts) {
      return ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'][new Date(ts).getDay()];
    }

    async function detailRow(code) {
      const res = await fetch('/api/link/' + code);
      const d = await res.json();
      const short = location.origin + '/' + code;
      const qr = 'https://api.qrserver.com/v1/create-qr-code/?size=96x96&data=' + encodeURIComponent(short);

      const max = Math.max(...d.daily.map(x => x.count), 1);
      const bars = d.daily.map(x =>
        `<div class="bar" title="${x.count} clicks">
           <div class="fill" style="height:${Math.round((x.count / max) * 44)}px"></div>
           <div class="day">${dayLabel(x.date)}</div>
         </div>`).join('');

      const sources = d.sources.map(s =>
        `<li><span>${host(s.source)}</span><span>${s.count}</span></li>`).join('') || '<li>No clicks yet</li>';
      const recent = d.recent.map(r =>
        `<li><span>${host(r.referrer)}</span><span>${ago(r.ts)}</span></li>`).join('') || '<li>No clicks yet</li>';

      return `<tr class="detail"><td colspan="4">
        <div class="detail-top">
          <div class="qr"><img src="${qr}" alt="QR code"></div>
          <div><h4>Last 7 days</h4><div class="bars">${bars}</div></div>
        </div>
        <div class="cols">
          <div><h4>Traffic sources</h4><ul>${sources}</ul></div>
          <div><h4>Recent clicks</h4><ul>${recent}</ul></div>
        </div>
      </td></tr>`;
    }

    async function load() {
      const res = await fetch('/api/stats');
      const data = await res.json();

      document.getElementById('t-links').textContent = data.totals.links;
      document.getElementById('t-clicks').textContent = data.totals.clicks;
      document.getElementById('t-avg').textContent = data.totals.avg;

      if (!data.links.length) {
        rows.innerHTML = '<tr><td colspan="4" class="empty">No links yet. Add one above.</td></tr>';
        return;
      }

      let html = '';
      for (const l of data.links) {
        const short = location.origin + '/' + l.code;
        html += `<tr class="row-main" data-code="${l.code}">
          <td>
            <a class="code" href="${short}" target="_blank">/${l.code}</a>
            <button class="copy" data-url="${short}">copy</button>
            <div class="orig">${l.url}</div>
          </td>
          <td class="time">${ago(l.created)}<br><span style="font-size:0.8rem">last: ${ago(l.lastClick)}</span></td>
          <td class="num">${l.clicks}</td>
          <td><button class="del" data-code="${l.code}">delete</button></td>
        </tr>`;
        if (l.code === openCode) html += await detailRow(l.code);
      }
      rows.innerHTML = html;
    }

    rows.addEventListener('click', async (e) => {
      const copyBtn = e.target.closest('.copy');
      if (copyBtn) {
        e.stopPropagation();
        await navigator.clipboard.writeText(copyBtn.dataset.url);
        copyBtn.textContent = 'copied';
        setTimeout(() => (copyBtn.textContent = 'copy'), 1200);
        return;
      }

      const delBtn = e.target.closest('.del');
      if (delBtn) {
        e.stopPropagation();
        if (!confirm('Delete /' + delBtn.dataset.code + ' and its click history?')) return;
        await fetch('/api/link/' + delBtn.dataset.code, { method: 'DELETE' });
        if (openCode === delBtn.dataset.code) openCode = null;
        load();
        return;
      }

      const row = e.target.closest('.row-main');
      if (row) {
        const code = row.dataset.code;
        openCode = openCode === code ? null : code;
        load();
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = '';
      const url = document.getElementById('url').value.trim();
      const code = document.getElementById('custom').value.trim();

      const res = await fetch('/api/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, code: code || undefined })
      });
      const data = await res.json();

      if (!res.ok) { err.textContent = data.error; return; }

      const qr = 'https://api.qrserver.com/v1/create-qr-code/?size=96x96&data=' + encodeURIComponent(data.short);
      result.style.display = 'flex';
      result.innerHTML =
        '<img src="' + qr + '" alt="QR code">' +
        '<div>' +
          '<div class="link"><a href="' + data.short + '" target="_blank">' + data.short + '</a></div>' +
          '<button class="copy rcopy" data-url="' + data.short + '">copy link</button>' +
        '</div>';

      form.reset();
      load();
    });

    result.addEventListener('click', async (e) => {
      const btn = e.target.closest('.copy');
      if (!btn) return;
      await navigator.clipboard.writeText(btn.dataset.url);
      btn.textContent = 'copied';
      setTimeout(() => (btn.textContent = 'copy link'), 1200);
    });

    load();
  </script>
</body>
</html>
